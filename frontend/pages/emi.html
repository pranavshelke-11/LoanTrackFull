<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoanTrack — EMI Tracker</title>
<link rel="stylesheet" href="../css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

<div class="main-content">
  <header class="topbar">
    <button class="menu-btn" onclick="toggleSidebar()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="topbar-title">EMI Tracker</div>
    <div class="topbar-right"><div class="avatar">U</div></div>
  </header>

  <div class="page-body">
    <div class="welcome-bar">
      <div>
        <h2>EMI Tracker</h2>
        <p id="emiSummaryNextDue">Track and manage your monthly EMI payments.</p>
      </div>
    </div>

    <!-- EMI Calculator -->
    <div class="card" style="margin-bottom:24px;">
      <div class="card-header"><h3>EMI Calculator</h3></div>
      <div class="calc-grid">
        <div class="form-group">
          <label>Loan Amount (₹)</label>
          <input type="number" id="calcPrincipal" value="500000" oninput="calculateEMI()">
        </div>
        <div class="form-group">
          <label>Interest Rate (% p.a.)</label>
          <input type="number" id="calcRate" value="8.5" step="0.1" oninput="calculateEMI()">
        </div>
        <div class="form-group">
          <label>Tenure (Months)</label>
          <input type="number" id="calcTenure" value="60" oninput="calculateEMI()">
        </div>
        <div class="emi-result">
          <p class="al">Monthly EMI</p>
          <p class="emi-value" id="emiResult">₹0</p>
          <p class="al" id="totalInterest">Total Interest: ₹0</p>
        </div>
      </div>
    </div>

    <!-- EMI Schedule Table -->
    <div class="card">
      <div class="card-header">
        <h3>EMI Payment Schedule</h3>
        <select onchange="filterMonth(this.value)" style="font-size:13px;padding:6px 10px;border-radius:8px;border:1.5px solid var(--border);">
          <option value="all">All</option>
          <option value="upcoming">Upcoming</option>
          <option value="paid">Paid</option>
          <option value="pending">Pending</option>
          <option value="overdue">Overdue</option>
        </select>
      </div>
      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr><th>#</th><th>Loan</th><th>Due Date</th><th>EMI Amount</th><th>Principal</th><th>Interest</th><th>Status</th><th>Action</th></tr>
          </thead>
          <tbody id="emiTableBody">
            <tr><td colspan="8" style="text-align:center;color:var(--muted);padding:20px;">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/main.js"></script>
<script src="../js/emi.js"></script>
<script>injectSidebar('emi.html');</script>
</body>
</html>
