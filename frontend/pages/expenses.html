<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LoanTrack — Expenses</title>
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

<div class="main-content">
  <header class="topbar">
    <button class="menu-btn" onclick="toggleSidebar()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="topbar-title">Expenses</div>
    <div class="topbar-right"><div class="avatar">U</div></div>
  </header>

  <div class="page-body">
    <div class="welcome-bar">
      <div><h2>💸 Manage Expenses</h2><p>Track your daily spending — saved to the cloud.</p></div>
    </div>

    <!-- Add Expense Form -->
    <div class="card" style="margin-bottom:20px;">
      <div class="card-header"><h3>Add Expense</h3></div>
      <form id="expenseForm">
        <div class="row-2" style="margin-bottom:12px;">
          <div class="form-group">
            <label>Amount (₹)</label>
            <input type="number" id="amount" placeholder="e.g. 500" min="1" required>
          </div>
          <div class="form-group">
            <label>Category</label>
            <select id="category" required>
              <option value="">Select Category</option>
              <option value="Food">🍔 Food</option>
              <option value="Travel">🚗 Travel</option>
              <option value="Bills">💡 Bills</option>
              <option value="Shopping">🛍️ Shopping</option>
              <option value="Health">🏥 Health</option>
              <option value="Other">📦 Other</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Description (optional)</label>
          <input type="text" id="note" placeholder="e.g. Lunch with team">
        </div>
        <button type="submit" class="btn-primary">Add Expense</button>
      </form>
    </div>

    <!-- Total -->
    <div class="stat-card" style="margin-bottom:20px;">
      <div class="stat-icon orange">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      </div>
      <div class="stat-info">
        <p class="stat-label">Total Expenses</p>
        <h3 class="stat-value">₹<span id="total">0</span></h3>
      </div>
    </div>

    <!-- Expense List -->
    <div class="card">
      <div class="card-header"><h3>All Expenses</h3></div>
      <ul id="list" style="list-style:none;padding:0;display:flex;flex-direction:column;gap:8px;"></ul>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/main.js"></script>
<script src="../js/expenses.js"></script>
<script>injectSidebar('expenses.html');</script>
</body>
</html>
