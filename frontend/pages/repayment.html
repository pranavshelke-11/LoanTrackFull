<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoanTrack — Repayment</title>
<link rel="stylesheet" href="../css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

<div class="main-content">
  <header class="topbar">
    <button class="menu-btn" onclick="toggleSidebar()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="topbar-title">Repayment</div>
    <div class="topbar-right"><div class="avatar">U</div></div>
  </header>

  <div class="page-body">
    <div class="welcome-bar">
      <div><h2>Repayment Overview</h2><p>Track your loan repayment progress.</p></div>
    </div>

    <!-- Summary Stats -->
    <div class="stats-grid" style="margin-bottom:24px;" id="repayStats">
      <div class="stat-card">
        <div class="stat-icon green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg></div>
        <div class="stat-info"><p class="stat-label">Total Repaid</p><h3 class="stat-value" id="rStatRepaid">₹0</h3></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon red"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
        <div class="stat-info"><p class="stat-label">Outstanding</p><h3 class="stat-value" id="rStatOutstanding">₹0</h3></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon blue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>
        <div class="stat-info"><p class="stat-label">Active Loans</p><h3 class="stat-value" id="rStatActive">0</h3></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon orange"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
        <div class="stat-info"><p class="stat-label">Total Loans</p><h3 class="stat-value" id="rStatTotal">0</h3></div>
      </div>
    </div>

    <!-- Per-Loan Repayment Progress -->
    <div class="card">
      <div class="card-header"><h3>Repayment Progress by Loan</h3></div>
      <div class="repay-list" id="repayList">
        <p style="color:var(--muted);text-align:center;padding:20px;">Loading...</p>
      </div>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/main.js"></script>
<script>
  injectSidebar('repayment.html');

  document.addEventListener('DOMContentLoaded', async () => {
    try {
      const data = await Loans.getAll();
      const loans = data.loans || [];
      const s = data.summary || {};

      document.getElementById('rStatRepaid').textContent     = '₹' + formatINR(s.totalRepaid || 0);
      document.getElementById('rStatOutstanding').textContent = '₹' + formatINR(s.totalOutstanding || 0);
      document.getElementById('rStatActive').textContent      = s.activeLoans || 0;
      document.getElementById('rStatTotal').textContent       = loans.length;

      const list = document.getElementById('repayList');
      const colors = ['blue', 'green', 'orange'];

      if (loans.length === 0) {
        list.innerHTML = '<p style="color:var(--muted);text-align:center;padding:20px;">No loans found. <a href="loans.html" class="link">Add your first loan</a></p>';
        return;
      }

      list.innerHTML = loans.map((loan, i) => {
        const outstanding = loan.outstanding || loan.principal;
        const repaid = loan.principal - outstanding;
        const pct = loan.principal > 0 ? Math.round((repaid / loan.principal) * 100) : 0;
        const color = colors[i % colors.length];
        const startDate = formatDate(loan.startDate);
        const endDate = (() => {
          const d = new Date(loan.startDate);
          d.setMonth(d.getMonth() + loan.tenureMonths);
          return formatDate(d);
        })();

        return `
          <div class="repay-item">
            <div class="repay-top">
              <div>
                <h4>${loan.loanType} <span class="chip">${loan.bankName}</span></h4>
                <p class="al">Started: ${startDate} · Ends: ${endDate}</p>
              </div>
              <span class="repay-pct ${color}-text">${pct}%</span>
            </div>
            <div class="progress-bar tall">
              <div class="progress-fill ${color}-fill" style="width:${pct}%"></div>
            </div>
            <div class="repay-stats">
              <div><p class="al">Principal Paid</p><p class="av">₹${formatINR(repaid)}</p></div>
              <div><p class="al">Outstanding</p><p class="av red-text">₹${formatINR(outstanding)}</p></div>
              <div><p class="al">Rate</p><p class="av">${loan.interestRate}% p.a.</p></div>
              <div><p class="al">Tenure Left</p><p class="av">${loan.tenureMonths} mo</p></div>
            </div>
          </div>`;
      }).join('');
    } catch (err) {
      showToast('Could not load repayment data: ' + err.message);
    }
  });
</script>
</body>
</html>
